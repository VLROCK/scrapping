name: Web Scraping Pipeline

on:
  schedule:
    - cron: '0 7 * * *'  # TODO DIA às 09:00 UTC
  workflow_dispatch:      # botão manual

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper e logs
        run: |
          python web_scraper.py | tee log.txt

      - name: Commit automático do banco
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add "data/dataset.db"
          
          git commit -m "Atualiza dataset automaticamente" || echo "Nada para commitar"
          git push