name: Web Scraping Pipeline2 Lixo

on:
  schedule:
    - cron: '0 3  * * *'  # TODO DIA às 09:00 UTC
  workflow_dispatch:      # botão manual

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scraper e logs
        run: |
          python lixo/lixo_scrap2.py | tee log.txt

      - name: Commit automático do banco
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add "data/dataset_lixo2.db"
          
          if git diff --cached --quiet; then
            echo "Nada para commitar"
            exit 0
          fi

          git commit -m "Atualiza dataset Lixo automaticamente"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"